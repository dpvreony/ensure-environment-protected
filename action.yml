name: 'Ensure Environment exists and protected'
description: 'Check if the specified GitHub environment exists and has protection rules'
author: 'David Vreony'
inputs:
  github_token:
    description: 'GitHub token to authenticate API requests'
    required: true
  environment_name:
    description: 'The name of the environment to check'
    required: true
  require-reviewers:
    description: 'Check that the environment has at least one required reviewer (secure first)'
    required: false
    default: 'true'
  require-prevent-self-review:
    description: 'Check that the environment has prevent self-review enabled'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Run environment check
      shell: pwsh
      run: |
        # Variables
        $repo = $env:GITHUB_REPOSITORY
        $environment = $env:ENVIRONMENT_NAME
        $url = "https://api.github.com/repos/$repo/environments/$environment"
        $headers = @{ Authorization = "token $env:GITHUB_TOKEN" }
        $requireReviewers = $env:REQUIRE_REVIEWERS -eq 'true'
        $requirePreventSelfReview = $env:REQUIRE_PREVENT_SELF_REVIEW -eq 'true'

        # Make the API request
        try {
            $response = Invoke-RestMethod -Uri $url -Headers $headers -Method Get -UseBasicParsing
        } catch {
            $statusCode = $_.Exception.Response.StatusCode
            if ($statusCode -eq 403) {
                Write-Host "Error: Insufficient permissions. Ensure that the workflow has the following permissions:"
                Write-Host "permissions: actions: read, contents: read, deployments: read"
                exit 1
            }

            if ($statusCode -eq 404) {
                Write-Host "Error: '$environment' environment does not exist."
                exit 1
            }

            Write-Host "Error: '$statusCode': $response"
            exit 1
        }

        # Check if protection rules exist
        $protectionRules = $response.protection_rules

        if (@($protectionRules).Count -eq 0) {
            Write-Host "Error: '$environment' environment exists but has no protection rules (approval requirements)."
            exit 1
        }

        # Check that meaningful protection rules exist beyond branch_policy.
        # branch_policy rules are available on all plans (including GitHub Free for private repos)
        # but do not require human approval before deployment. Rules such as required_reviewers
        # and wait_timer are only available on paid plans for private repos, so their absence
        # indicates that environment protection is not licensed/enabled for this repository.
        $humanApprovalRules = @($protectionRules | Where-Object { $_.type -ne 'branch_policy' })
        if ($humanApprovalRules.Count -eq 0) {
            Write-Host "Error: '$environment' environment only has deployment branch policy protection rules but no rules requiring human approval (required_reviewers or wait_timer)."
            Write-Host "This typically means the repository plan does not support environment protection rules (e.g. private repos on GitHub Free)."
            exit 1
        }

        # Extract required_reviewers rules for efficiency (used by multiple checks)
        $requiredReviewerRules = @($protectionRules | Where-Object { $_.type -eq 'required_reviewers' })

        # Check for required reviewers if flag is enabled
        if ($requireReviewers) {
            if ($requiredReviewerRules.Count -eq 0) {
                Write-Host "Error: '$environment' environment has no required_reviewers protection rule configured."
                exit 1
            }
            
            $hasReviewers = $false
            foreach ($rule in $requiredReviewerRules) {
                if ($rule.reviewers -and $rule.reviewers.Count -gt 0) {
                    $hasReviewers = $true
                    break
                }
            }
            
            if (-not $hasReviewers) {
                Write-Host "Error: '$environment' environment has required_reviewers protection rule but no actual reviewers are assigned."
                exit 1
            }
            
            Write-Host "'$environment' environment has required reviewers configured."
        }

        # Check for prevent self-review if flag is enabled
        if ($requirePreventSelfReview) {
            if ($requiredReviewerRules.Count -eq 0) {
                Write-Host "Error: '$environment' environment has no required_reviewers protection rule to check prevent_self_review."
                exit 1
            }
            
            $hasPreventSelfReview = $false
            foreach ($rule in $requiredReviewerRules) {
                if ($rule.prevent_self_review -eq $true) {
                    $hasPreventSelfReview = $true
                    break
                }
            }
            
            if (-not $hasPreventSelfReview) {
                Write-Host "Error: '$environment' environment does not have prevent_self_review enabled."
                exit 1
            }
            
            Write-Host "'$environment' environment has prevent_self_review enabled."
        }

        Write-Host "'$environment' environment exists and has protection rules."

      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        ENVIRONMENT_NAME: ${{ inputs.environment_name }}
        REQUIRE_REVIEWERS: ${{ inputs.require-reviewers }}
        REQUIRE_PREVENT_SELF_REVIEW: ${{ inputs.require-prevent-self-review }}
